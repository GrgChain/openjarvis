x-common-config: &common-config
  image: openjarvis:latest
  volumes:
    - ~/.nanobot:/root/.nanobot
  env_file:
    - .env

services:
  nanobot-server:
    container_name: nanobot-server
    <<: *common-config
    command: [ "server" ]
    restart: unless-stopped
    ports:
      - 18790:18790
      - 4096:4096

  nanobot-cli:
    <<: *common-config
    profiles:
      - cli
    command: [ "status" ]
    stdin_open: true
    tty: true
